server:
  port: 8080

spring:
  application:
    name: api-gateway

  reactor:
    context-propagation: auto

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      server:
        webflux:
          # --- ADD THIS BLOCK HERE ---
          metrics:
            enabled: true
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          # Fixed Location 1: Moved httpclient inside server.webflux
          httpclient:
            connect-timeout: 10000
            response-timeout: 30s
          # Fixed Location 2: Moved routes inside server.webflux
          routes:
            - id: product-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/products/**
              metadata:
                operation.name: "Product Data"
              filters:
                - name: CircuitBreaker
                  args:
                    name: productServiceCircuitBreaker
                    fallbackUri: forward:/fallback/product-fallback
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"

            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/orders/**
              metadata:
                operation.name: "Order Data"
              filters:
                - name: CircuitBreaker
                  args:
                    name: orderServiceCircuitBreaker
                    fallbackUri: forward:/fallback/order-fallback
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"

            - id: payment-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/payments/**
              metadata:
                operation.name: "Payment Data"
              filters:
                - name: CircuitBreaker
                  args:
                    name: paymentServiceCircuitBreaker
                    fallbackUri: forward:/fallback/payment-fallback
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"

      reactor:
        netty:
          http:
            client:
              resolver:
                type: DEFAULT

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# ==================== RESILIENCE4J CIRCUIT BREAKER ====================
resilience4j:
  # === ADD THIS TIMELIMITER CONFIGURATION BLOCK ===
  timelimiter:
    instances:
      productServiceCircuitBreaker:
        timeoutDuration: 5s # Gives the database transaction up to 5 seconds to fully complete
      orderServiceCircuitBreaker:
        timeoutDuration: 5s
      paymentServiceCircuitBreaker:
        timeoutDuration: 5s

  circuitbreaker:
    instances:
      productServiceCircuitBreaker:
        slidingWindowSize: 30
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 8
        failureRateThreshold: 85
        waitDurationInOpenState: 30s
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 5s
        automaticTransitionFromOpenToHalfOpenEnabled: true


      orderServiceCircuitBreaker:
        slidingWindowSize: 30
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 8
        failureRateThreshold: 85
        waitDurationInOpenState: 30s

      paymentServiceCircuitBreaker:
        slidingWindowSize: 30
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 8
        failureRateThreshold: 85
        waitDurationInOpenState: 30s

management:
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      endpoint: http://localhost:4318/v1/traces

  tracing:
    export:
      enabled: true
    sampling:
      probability: 1.0  
    propagation:
      type: w3c         

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-}]"
  level:
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j.circuitbreaker: INFO