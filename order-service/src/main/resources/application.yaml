server:
  port: 8082
  forward-headers-strategy: framework

spring:
  application:
    name: order-service
    
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    url: jdbc:mysql://localhost:3308/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    password: rootpassword
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: 'true'
    hibernate:
      ddl-auto: update
    show-sql: 'true'

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: 
      - localhost:19092
      - localhost:19093
      - localhost:19094
    consumer:
      group-id: order-group
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        
        # FIX: Enable type headers so Spring reads incoming class paths and processes your mapping below
        spring.json.use.type.headers: true
        
        # MAP THE FULL PATH CLASS STRINGS FROM OTHER SERVICES TO YOUR LOCAL EVENT CLASSES
        spring.json.type.mapping: >-
          com.product_service.event.InventoryAllocatedEvent:com.order_service.event.InventoryAllocatedEvent,
          com.payment_service.event.PaymentFailedEvent:com.order_service.event.PaymentFailedEvent,
          com.inventory_service.event.InventoryFailedEvent:com.order_service.event.InventoryFailedEvent
          
        max.poll.records: 500
        session.timeout.ms: 45000
        heartbeat.interval.ms: 15000

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      client-id: order-service
      linger.ms: 20
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        spring.json.type.mapping: "orderPlaced:com.order_service.event.OrderPlacedEvent"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    eureka-server-connect-timeout-seconds: 5
    eureka-server-read-timeout-seconds: 5
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-}]"
    
management:
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      endpoint: http://localhost:4318/v1/traces

  tracing:
    export:
      enabled: true
    sampling:
      probability: 1.0  
    propagation:
      type: w3c