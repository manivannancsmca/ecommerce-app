server:
  port: 8083
  forward-headers-strategy: framework

spring:
  application:
    name: payment-service
    
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    url: jdbc:mysql://localhost:3309/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    password: rootpassword
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: 'true'
    hibernate:
      ddl-auto: update
    show-sql: 'true'

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: 
      - localhost:19092
      - localhost:19093
      - localhost:19094
    consumer:
      group-id: payment-group
      auto-offset-reset: latest  #earliest
      # Uses ErrorHandlingDeserializer to catch bad records without crashing the thread loop
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        # Delegates processing to the standard Jackson JsonDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        # Trusts all packages for deserialization
        spring.json.trusted.packages: "*"
        # Forces fallback deserialization strictly into your local event class
        spring.json.value.default.type: "com.payment_service.event.OrderPlacedEvent"
        # CRITICAL: Ignores the incoming __TypeId__ header from the Order Service completely
        spring.json.use.type.headers: false
        max.poll.records: 500
        session.timeout.ms: 45000
        heartbeat.interval.ms: 15000

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      client-id: payment-service
      linger.ms: 20
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        spring.json.type.mapping: "paymentFailed:com.payment_service.event.PaymentFailedEvent"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    # Protect the thread pool by setting strict timeouts on Eureka HTTP calls
    eureka-server-connect-timeout-seconds: 5
    eureka-server-read-timeout-seconds: 5
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-}]"
    
management:
  # 1. Disable the OTLP Metric Registry globally
  otlp:
    metrics:
      export:
        enabled: false
    # 2. Correct native OTLP Tracing configuration for Spring Boot 3.4/3.5
    tracing:
      endpoint: http://localhost:4318/v1/traces

  # 3. Keep standard Tracing configurations active 
  tracing:
    export:
      enabled: true
    sampling:
      probability: 1.0  # Captures 100% of requests for dev testing
    propagation:
      type: w3c         # Standard OpenTelemetry layout